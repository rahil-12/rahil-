<html>
    <head>
        <title>Practical 11</title>
        <link rel="stylesheet" href="../css/practical18b.css">
        <body>
            <!-- Header Section -->
            <div id="header">
                <h4>Rahil</h4>
                <p>This is the practical solutions for practical 11.</p>
            </div>
            <!-- Main Content -->
            <div id="content">
                <div class="regForm">
                    <form action="practical11.html">
                        <fieldset>
                        <legend><h3>Registration Form</h3></legend>
                        <p>
                            <label for="name">Name</label>
                            <input type="text" placeholder="Enter your name here..">    
                            </p>
                         <p>
                            <label for="email">Email</label>
                            <input type="email" placeholder="Enter your email here..">    
                            </p>
                            <p>
                                <label for="ph_no">Phone Number</label>
                                    <input type="text">
                                    <p> 
                                        <label for="address">Address</label>
                                        <textarea name="address" id="address" placeholder="Enter your address.."></textarea>

                                    </p>
                                    <p>
                                        <label for="dob">Date of Birth</label>
                                        <input type="date" name="dob" id="dob">
                                    </p> 
                                    <p>
                                        <label for="age">Age</label>
                                        <input type="number">

                            </p>   
                            <p>
                                <label for="gender">Gender</label>
                                <input type="radio" name="gender" id="male" value="male">male
                                <input type="radio" name="gender" id="female" value="female">female

                            </p> 
                            <p>
                                <label for="hobbies">Hobbies</label>
                               <input type="checkbox" name="hobbies" value="reading">Reading
                               <input type="checkbox" name="hobbies" value="traveling">Traveling
                                 <input type="checkbox" name="hobbies" value="sports">Sports
                                 <input type="checkbox" name="hobbies" value="music">Music
                                 <input type="checkbox" name="hobbies" value="gaming">Gaming
                            </p>
                            <p>
                                
                                <label for="dipartments" >Departments</label>
                                <select name="departments" id="departments">
                                    <option value="cse">Computer Science</option>
                                    <option value="ece">Electronics</option>
                                    <option value="mech">Mechanical</option>
                                    <option value="civil">Civil</option>
                                    <option value="bio">Biotechnology</option>
                                </select>
                            
                            </p>
                             <p>
                                <label for="file">Upload File</label>
                                <input type="file" name="doc" id="doc">
                             </p>
                             <p>
                             <label for="password">Password</label>
                                <input type="password" name="pwd" id="pwd" placeholder="Enter your password">
                             </p>
                                <input type="submit" value="Submit">
                                <input type="reset" value="Reset">
                            </br>
                                <p>
                                    <h4>if you have an account? <a href="practical12.html">Login Here</a></h4>
                                </p>
                    </form>
                        </fieldset>
                </div>
              </div>
              <!-- footer section -->
            <div id="footer">
                <p>&copy;Rahil</p>
            </div>  
        </body>
    </head>
</html>
